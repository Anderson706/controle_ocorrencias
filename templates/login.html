<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Login | Controle de Ocorrência</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --dhl-red:#d40511;
      --dhl-red-dark:#b3030e;
      --bg:#f3f5f7;
      --card:#ffffff;
      --line:#e5e7eb;
      --text:#1f2937;
      --muted:#6b7280;
      --shadow:0 12px 28px rgba(15,23,42,.08);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,#f3f5f7,#eceff3);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      color:var(--text);
    }
    .auth-card{
      width:100%;
      max-width:460px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      padding:30px;
      box-shadow:var(--shadow);
    }
    .logo-box{
      display:flex;
      justify-content:center;
      margin-bottom:18px;
    }
    .logo-box img{ max-height:52px; }
    h1{
      margin:0 0 8px;
      text-align:center;
      font-size:28px;
      color:#1f1f1f;
    }
    .sub{
      margin:0 0 22px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:14px;
    }
    .field label{
      font-size:13px;
      font-weight:800;
      color:var(--muted);
    }
    .field input{
      width:100%;
      border:1px solid #d6dae1;
      border-radius:14px;
      padding:13px 14px;
      font-size:14px;
      outline:none;
    }
    .field input:focus{
      border-color:#d40511;
      box-shadow:0 0 0 4px rgba(212,5,17,.08);
    }
    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:13px 16px;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      background:linear-gradient(180deg,var(--dhl-red),var(--dhl-red-dark));
      color:#fff;
      margin-top:8px;
    }
    .flash{
      margin-bottom:12px;
      padding:12px 14px;
      border-radius:12px;
      font-weight:700;
      font-size:14px;
    }
    .flash.success{ background:#e6fffa; color:#065f46; }
    .flash.danger{ background:#ffe4e6; color:#9f1239; }
    .flash.warning{ background:#fff4db; color:#9a6700; }
    .hint{
      margin-top:16px;
      font-size:12px;
      color:#6b7280;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo-box">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo DHL">
    </div>

    <h1>Acesso ao Sistema</h1>
    <p class="sub">Controle de Ocorrência</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="field">
        <label>Usuário</label>
        <input type="text" name="username" required>
      </div>

      <div class="field">
        <label>Senha</label>
        <input type="password" name="senha" required>
      </div>

      <button type="submit" class="btn">Entrar</button>
    </form>

    <div class="hint">
      Login inicial: <strong>admin</strong> | Senha: <strong>123456</strong>
    </div>
  </div>
</body>
</html>
