<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Home | Controle de Ocorrência</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#f3f5f7;
    }
    .wrap{
      max-width:900px;
      margin:60px auto;
      background:#fff;
      border-radius:20px;
      padding:30px;
      box-shadow:0 12px 28px rgba(15,23,42,.08);
    }
    .btn{
      display:inline-block;
      padding:12px 16px;
      border-radius:12px;
      text-decoration:none;
      font-weight:700;
      margin-right:10px;
    }
    .btn-red{ background:#d40511; color:#fff; }
    .btn-dark{ background:#1f2937; color:#fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Controle de Ocorrência</h1>
    <p>Bem-vindo, <strong>{{ session.get('user_nome') }}</strong>.</p>
    <p>Perfil: <strong>{{ session.get('user_perfil') }}</strong></p>

    <div style="margin-top:20px;">
      {% if session.get('user_perfil') == 'SUPERUSUARIO' %}
        <a href="{{ url_for('register') }}" class="btn btn-red">Criar usuário</a>
        <a href="{{ url_for('listar_usuarios') }}" class="btn btn-dark">Listar usuários</a>
      {% endif %}
      <a href="{{ url_for('logout') }}" class="btn btn-dark">Sair</a>
    </div>
  </div>
</body>
</html>
